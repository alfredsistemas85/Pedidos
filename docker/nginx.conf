events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    
    # 1. Proxy para el Backend (FastAPI)
    server {
        listen 80;
        server_name backpedidos-nea.agentech.ar;

        location / {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 2. Proxy para el Frontend (Vite/React)
    server {
        listen 80;
        server_name pedidos-nea.agentech.ar;

        location / {
            # Como estás usando Vite, el puerto por defecto es 5173
            proxy_pass http://frontend:5173;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Soporte para WebSockets de Vite
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }

    # 3. Proxy para Evolution API (WhatsApp)
    server {
        listen 80;
        # Te sugiero crear este subdominio en Cloudflare
        server_name whatsapp.agentech.ar;

        location / {
            proxy_pass http://evolution_api:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Evolution API requiere soporte de WebSockets para funcionar bien
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
        }
    }
}
