version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maspizzas_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379/0
    networks:
      - maspizzas_net
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: maspizzas_redis
    restart: unless-stopped
    networks:
      - maspizzas_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: maspizzas_frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    networks:
      - maspizzas_net

  nginx:
    image: nginx:alpine
    container_name: maspizzas_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - maspizzas_net
    depends_on:
      - backend
      - frontend

  # ==========================================
  # NUEVOS SERVICIOS PARA EVOLUTION API
  # ==========================================
  
  postgres_evolution:
    image: postgres:15-alpine
    container_name: maspizzas_postgres_evolution
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evolution_admin
      - POSTGRES_PASSWORD=UnPasswordMuyDificil123  # ¡Cámbialo en tu VPS!
      - POSTGRES_DB=evolution_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - maspizzas_net

  evolution_api:
    image: evoapicloud/evolution-api:latest
    container_name: maspizzas_evolution_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./evolution-api/.env  
    networks:
      - maspizzas_net
    depends_on:
      - postgres_evolution
      - redis

networks:
  maspizzas_net:
    driver: bridge